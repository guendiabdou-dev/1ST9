<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>classe 1ST9</title>
    <style>
        /* إعدادات الخطوط والخلفية */
        body {
            background-color: #5D4037; /* لون بني دافئ */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        /* تنسيق العنوان */
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            border-bottom: 2px solid #D7CCC8;
            padding-bottom: 10px;
        }

        /* تنسيق الفقرة */
        .intro-text {
            font-size: 1.5rem;
            font-style: italic;
            color: #D7CCC8;
            margin-bottom: 30px;
            max-width: 600px;
            line-height: 1.6;
        }

        /* تنسيق الصورة */
        .banner-img {
            max-width: 300px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            margin: 20px 0;
            border: 3px solid #8D6E63;
        }

        /* تنسيق قائمة الأسماء */
        .team-section {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 20px 40px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .team-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #BCAAA4;
        }

        ul {
            list-style-type: square; /* رؤوس أقلام مربعة */
            padding: 0;
            font-size: 1.2rem;
            text-align: right;
            display: inline-block;
        }

        li {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <h1>بحث المعلوماتية</h1>

    <p class="intro-text">
        نتمنى أن يعجبكم البحث، شكراً على المتابعة.
    </p>

    <img src="https://via.placeholder.com/400x200/8D6E63/ffffff?text=1ST9" alt="1ST9" class="banner-img">

    <div class="team-section">
        <div class="team-title">كان معكم:</div>
        <ul>
            <li>عبدالرحيم قندوز</li>
            <li>عبد الوهاب</li>
            <li>صهيب</li>
            <li>رفيق</li>
            <li>عماد</li>
        </ul>
    </div>

</body>
</html>
